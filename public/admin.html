<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannello di Controllo</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: 'var(--color-primary)',
                        secondary: 'var(--color-secondary)',
                        dark: '#0F172A',
                        darker: '#0B0F19',
                        card: 'rgba(30, 41, 59, 0.7)',
                    }
                }
            }
        }
    </script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --color-primary: #3b82f6; /* Blue as default admin color */
            --color-secondary: #8b5cf6;
        }
        input, select { color: black; }
    </style>
</head>
<body class="bg-darker text-white font-sans min-h-screen relative overflow-x-hidden selection:bg-primary selection:text-white pb-32">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-dark/80 backdrop-blur-md border-b border-white/10 p-4 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="index.html" aria-label="Torna alla Home" class="text-gray-400 hover:text-white transition-colors">
                    <i class="ph-bold ph-arrow-left text-2xl"></i>
                </a>
                <h1 class="text-xl font-bold tracking-tight">Pannello di Controllo</h1>
            </div>
            <button id="saveBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-lg shadow-lg flex items-center gap-2 transition-all">
                <i class="ph-bold ph-floppy-disk"></i>
                Salva Modifiche
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 mt-6 space-y-10">
        <!-- Settings Section -->
        <section class="glass-card p-6 rounded-2xl">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 border-b border-white/10 pb-4">
                <i class="ph-duotone ph-palette text-blue-400"></i>
                Impostazioni Generali
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label for="cfgAppName" class="block text-sm font-medium text-gray-400 mb-2">Nome App</label>
                    <input type="text" id="cfgAppName" class="w-full px-4 py-2 rounded-lg bg-dark border border-white/10 text-white focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label for="cfgColorPrimary" class="block text-sm font-medium text-gray-400 mb-2">Colore Primario</label>
                    <div class="flex gap-2">
                        <input type="color" id="cfgColorPrimary" class="h-10 w-12 bg-transparent border-0 rounded cursor-pointer">
                        <input type="text" id="cfgColorPrimaryText" aria-label="Valore colore primario" class="w-full px-4 py-2 rounded-lg bg-dark border border-white/10 text-white focus:outline-none focus:border-blue-500" readonly>
                    </div>
                </div>
                <div>
                    <label for="cfgColorSecondary" class="block text-sm font-medium text-gray-400 mb-2">Colore Secondario</label>
                    <div class="flex gap-2">
                        <input type="color" id="cfgColorSecondary" class="h-10 w-12 bg-transparent border-0 rounded cursor-pointer">
                        <input type="text" id="cfgColorSecondaryText" aria-label="Valore colore secondario" class="w-full px-4 py-2 rounded-lg bg-dark border border-white/10 text-white focus:outline-none focus:border-blue-500" readonly>
                    </div>
                </div>
            </div>
        </section>

        <!-- Categories Section -->
        <section class="glass-card p-6 rounded-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <h2 class="text-2xl font-bold flex items-center gap-2">
                    <i class="ph-duotone ph-list-dashes text-blue-400"></i>
                    Categorie
                </h2>
                <button id="addCategoryBtn" class="text-sm bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg flex items-center gap-2">
                    <i class="ph-bold ph-plus"></i> Nuova
                </button>
            </div>
            <div id="categoriesList" class="space-y-3"></div>
        </section>

        <!-- Suppliers Section -->
        <section class="glass-card p-6 rounded-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <h2 class="text-2xl font-bold flex items-center gap-2">
                    <i class="ph-duotone ph-truck text-blue-400"></i>
                    Fornitori
                </h2>
                <button id="addSupplierBtn" class="text-sm bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg flex items-center gap-2">
                    <i class="ph-bold ph-plus"></i> Nuovo
                </button>
            </div>
            <div id="suppliersList" class="space-y-4"></div>
        </section>

        <!-- Items Section -->
        <section class="glass-card p-6 rounded-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <h2 class="text-2xl font-bold flex items-center gap-2">
                    <i class="ph-duotone ph-hamburger text-blue-400"></i>
                    Articoli Catalogo
                </h2>
                <button id="addItemBtn" class="text-sm bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg flex items-center gap-2">
                    <i class="ph-bold ph-plus"></i> Nuovo Articolo
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-gray-400 text-sm border-b border-white/10">
                            <th class="pb-2">Nome</th>
                            <th class="pb-2">Categoria</th>
                            <th class="pb-2">Fornitore</th>
                            <th class="pb-2">Unità</th>
                            <th class="pb-2 text-right">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="itemsList" class="text-sm">
                        <!-- Items rendered via JS -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all z-50">
        Salvataggio completato!
    </div>

    <!-- Modals Area -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <!-- Item Modal -->
        <div id="itemModal" class="bg-dark border border-white/10 p-6 rounded-2xl w-full max-w-md hidden">
            <h3 id="itemModalTitle" class="text-xl font-bold mb-4">Aggiungi/Modifica Articolo</h3>
            <div class="space-y-4">
                <input type="hidden" id="modalItemId">
                <div>
                    <label for="modalItemName" class="block text-sm text-gray-400 mb-1">Nome Articolo</label>
                    <input type="text" id="modalItemName" class="w-full px-4 py-2 rounded-lg bg-darker border border-white/10 text-white">
                </div>
                <div>
                    <label for="modalItemCategory" class="block text-sm text-gray-400 mb-1">Categoria</label>
                    <select id="modalItemCategory" class="w-full px-4 py-2 rounded-lg bg-darker border border-white/10 text-white appearance-none"></select>
                </div>
                <div>
                    <label for="modalItemSupplier" class="block text-sm text-gray-400 mb-1">Fornitore</label>
                    <select id="modalItemSupplier" class="w-full px-4 py-2 rounded-lg bg-darker border border-white/10 text-white appearance-none"></select>
                </div>
                <div>
                    <label for="modalItemUnit" class="block text-sm text-gray-400 mb-1">Unità di Misura (es. Kg, Pezzi)</label>
                    <input type="text" id="modalItemUnit" class="w-full px-4 py-2 rounded-lg bg-darker border border-white/10 text-white">
                </div>
                <div class="flex gap-3 justify-end mt-6">
                    <button class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-white btn-cancel-modal">Annulla</button>
                    <button id="saveItemBtn" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white">Conferma</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
