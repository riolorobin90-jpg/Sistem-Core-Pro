<!DOCTYPE html>
<html lang="it" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Lab - Gestione Ordini Pro</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- PWA / Mobile App Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Burger Lab">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="favicon.png">


    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#050505',
                            card: 'rgba(255, 255, 255, 0.03)',
                            border: 'rgba(255, 255, 255, 0.08)',
                            orange: 'var(--brand-orange, #FF512F)',
                            red: 'var(--brand-red, #DD2476)',
                            whatsapp: '#00E676'
                        }
                    },
                    animation: {
                        blob: "blob 15s infinite alternate",
                        blob2: "blob2 20s infinite alternate",
                        pulseSlow: "pulseSlow 4s infinite alternate"
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)", opacity: 0.3 },
                            "50%": { transform: "translate(10vw, -10vh) scale(1.2)", opacity: 0.5 },
                            "100%": { transform: "translate(-5vw, 5vh) scale(0.9)", opacity: 0.3 }
                        },
                        blob2: {
                            "0%": { transform: "translate(0px, 0px) scale(1)", opacity: 0.3 },
                            "50%": { transform: "translate(-10vw, 15vh) scale(1.3)", opacity: 0.4 },
                            "100%": { transform: "translate(10vw, -5vh) scale(0.8)", opacity: 0.3 }
                        },
                        pulseSlow: {
                            "0%": { opacity: 0.6 },
                            "100%": { opacity: 1 }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @supports (scrollbar-width: none) {
            .no-scrollbar {
                scrollbar-width: none;
            }
        }

        .no-scrollbar {
            -ms-overflow-style: none;
        }

        body {
            background-color: #050505;
            color: #ffffff;
        }

        .glass-panel {
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
            background: rgba(10, 10, 12, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }

        /* Testo Gradient */
        .text-gradient {
            background: linear-gradient(135deg, #FF512F 0%, #DD2476 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .delay-2s {
            animation-delay: 2s;
        }

        .delay-4s {
            animation-delay: 4s;
        }
    </style>
</head>

<body class="font-sans antialiased selection:bg-brand-orange selection:text-white relative overflow-x-hidden">

    <!-- Loading Screen -->
    <div id="loading-screen"
        class="fixed inset-0 z-[100] bg-[#050505] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative w-24 h-24">
            <div class="absolute inset-0 rounded-full border-4 border-white/5"></div>
            <div class="absolute inset-0 rounded-full border-4 border-t-brand-orange animate-spin"></div>
        </div>
        <p class="mt-6 text-white/40 font-bold tracking-[0.3em] uppercase text-xs animate-pulse">Caricamento catalogo...
        </p>
    </div>

    <div id="app-content" class="opacity-0 transition-opacity duration-700 hidden">


        <!-- Animated Background Blobs -->
        <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
            <div
                class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-brand-orange/20 blur-[120px] mix-blend-screen animate-blob">
            </div>
            <div
                class="absolute top-[30%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-brand-red/20 blur-[100px] mix-blend-screen animate-blob2 delay-2s">
            </div>
            <div
                class="absolute bottom-[-20%] left-[20%] w-[60vw] h-[60vw] rounded-full bg-purple-900/20 blur-[150px] mix-blend-screen animate-blob delay-4s">
            </div>
        </div>

        <!-- Header -->
        <header
            class="fixed top-0 inset-x-0 z-40 bg-brand-dark/40 backdrop-blur-3xl border-b border-white/10 shadow-2xl">
            <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 rounded-2xl bg-gradient-to-br from-brand-orange to-brand-red p-[1px] shadow-[0_0_20px_rgba(255,81,47,0.4)] overflow-hidden">
                        <div class="w-full h-full bg-[#0A0A0C] rounded-2xl flex items-center justify-center overflow-hidden"
                            id="logo-container">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                id="default-logo">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                        </div>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-white/70 tracking-tight"
                            id="app-name-display">Burger Lab</h1>
                        <p id="app-subtitle-display"
                            class="text-[10px] text-brand-orange font-bold tracking-[0.2em] uppercase mt-0.5 animate-pulseSlow">
                            System Core Pro</p>
                    </div>
                </div>
                <div class="flex items-center gap-3 md:gap-4">
                    <a href="admin.html" aria-label="Pannello Admin"
                        class="flex items-center gap-2 bg-white/5 hover:bg-white/10 p-2.5 md:px-4 md:py-2.5 rounded-xl md:rounded-2xl border border-white/10 transition-colors shadow-[inset_0_2px_10px_rgba(255,255,255,0.02)]">
                        <svg class="w-5 h-5 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span class="hidden md:inline text-sm font-semibold text-white/80 tracking-wide">Admin</span>
                    </a>
                    <div
                        class="hidden sm:flex items-center gap-3 bg-white/5 px-4 md:px-5 py-2.5 rounded-xl md:rounded-2xl border border-white/10 shadow-[inset_0_2px_10px_rgba(255,255,255,0.02)]">
                        <span
                            class="w-2.5 h-2.5 rounded-full bg-brand-whatsapp shadow-[0_0_12px_#00E676] animate-pulse"></span>
                        <span id="app-status-display" class="hidden md:inline text-sm font-semibold text-white/80 tracking-wide">Live Order System</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-6 pt-32 pb-48">
            <div id="categories-container" class="space-y-12">
                <!-- Categorie generate dinamicamente -->
            </div>
        </main>

        <!-- Sticky Bottom Bar -->
        <div class="fixed bottom-0 inset-x-0 p-6 z-30 pointer-events-none flex justify-end max-w-7xl mx-auto">
            <div class="w-full md:w-auto min-w-[280px] pointer-events-auto group">
                <div
                    class="absolute inset-0 bg-gradient-to-r from-brand-orange to-brand-red rounded-[2rem] blur-xl opacity-0 group-hover:opacity-40 transition-opacity duration-500">
                </div>
                <button id="btn-generate-order"
                    class="relative w-full bg-brand-card backdrop-blur-3xl border border-white/20 text-white font-bold text-lg py-3 px-6 rounded-[2rem] shadow-2xl transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] overflow-hidden isolate">
                    <div
                        class="absolute inset-0 bg-gradient-to-r from-brand-orange to-brand-red opacity-0 group-hover:opacity-20 transition-opacity duration-300 z-[-1]">
                    </div>
                    <div class="flex items-center justify-center gap-3 relative z-10">
                        <i data-lucide="shopping-cart" class="w-5 h-5 text-brand-orange"></i>
                        <span class="tracking-widest uppercase">Genera Ordini</span>
                        <span id="order-badge"
                            class="hidden ml-2 bg-gradient-to-r from-brand-orange to-brand-red px-3 py-1 rounded-xl text-sm font-black shadow-[0_0_15px_rgba(255,81,47,0.5)]">0</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Backdrop -->
    <div id="modal-backdrop"
        class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden opacity-0 transition-opacity duration-500"></div>

    <!-- Offcanvas Panel -->
    <div id="orders-panel"
        class="fixed inset-y-0 right-0 z-50 w-full md:w-[540px] glass-panel shadow-[0_0_50px_rgba(0,0,0,0.8)] flex flex-col transform translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)]">
        <!-- Panel Header -->
        <div
            class="flex-shrink-0 px-8 py-8 border-b border-white/5 bg-transparent flex items-center justify-between relative overflow-hidden">
            <div
                class="absolute top-0 right-0 w-64 h-64 bg-brand-orange/20 blur-[80px] rounded-full pointer-events-none">
            </div>
            <div class="relative z-10">
                <h2 class="text-3xl font-black text-white tracking-tight">Riepilogo<span
                        class="text-brand-orange">.</span></h2>
                <p class="text-xs text-white/50 mt-2 font-bold tracking-[0.2em] uppercase">Centro di controllo</p>
            </div>
            <button id="btn-close-modal" aria-label="Chiudi pannello"
                class="relative z-10 p-3 rounded-2xl bg-white/5 border border-white/10 text-white/50 hover:bg-white/10 hover:text-white hover:rotate-90 transition-all duration-300 active:scale-90">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Panel Body -->
        <div id="orders-content" class="flex-1 overflow-y-auto p-8 space-y-8 no-scrollbar relative z-10">
            <!-- Generato via JS -->
        </div>
    </div>

    <!-- Script -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
